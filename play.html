<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jugar · Saitec Quiz</title><link rel="stylesheet" href="style.css"></head>
<body><main><section id="join" class="card"><h1>Entrar a jugar</h1><label>Código<input id="pin" inputmode="numeric" maxlength="6" placeholder="123456"></label><label>Tu nombre<input id="name" maxlength="20" placeholder="Babi"></label><button id="enter" class="button">Entrar</button><p id="error" class="error"></p></section>
<section id="waiting" class="card hidden"><h1>¡Ya estás dentro!</h1><p>Espera a que la persona anfitriona empiece la partida.</p><div class="loader"></div></section>
<section id="game" class="card wide hidden"><p id="progress" class="eyebrow"></p><h1 id="question"></h1><div id="answers" class="answers"></div><p id="feedback"></p></section>
<section id="finish" class="card hidden"><h1>Resultado final</h1><div id="ranking" class="ranking"></div></section></main><script src="/socket.io/socket.io.js"></script><script src="play.js"></script></body></html>
