<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crear partida · Saitec Quiz</title><link rel="stylesheet" href="style.css"></head>
<body><main><section id="builder" class="card wide"><h1>Crear un quiz</h1><label>Título<input id="title" value="Quiz Saitec" maxlength="60"></label><div id="questions"></div><button id="add" class="button secondary">+ Añadir pregunta</button><button id="create" class="button">Crear partida</button><p id="error" class="error"></p></section>
<section id="lobby" class="card wide hidden"><p class="eyebrow">Código de la partida</p><div id="pin" class="pin"></div><p>Los compañeros entran en esta web y pulsan “Entrar a una partida”.</p><h2>Jugadores (<span id="count">0</span>/10)</h2><div id="players" class="players"></div><button id="start" class="button">Empezar</button></section>
<section id="game" class="card wide hidden"><p id="progress" class="eyebrow"></p><h1 id="question"></h1><div id="hostOptions" class="answers"></div><h2>Marcador</h2><div id="scores" class="players"></div><button id="next" class="button">Siguiente pregunta</button></section>
<section id="finish" class="card wide hidden"><h1>🏆 Clasificación final</h1><div id="ranking" class="ranking"></div><a href="host.html" class="button">Crear otra partida</a></section></main><script src="/socket.io/socket.io.js"></script><script src="host.js"></script></body></html>
